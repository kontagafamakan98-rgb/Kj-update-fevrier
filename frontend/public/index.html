    <!-- Service Worker Registration -->
    <script>
      // TEMPORAIREMENT DÉSACTIVÉ POUR CORRIGER LES ERREURS DE CACHE
      console.log('Service Worker temporairement désactivé');
      
      // Désinscrire tout service worker existant
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function(boolean) {
              console.log('Service Worker désinscrit:', boolean);
            });
          }
        });
        
        // Effacer tous les caches
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('Cache supprimé:', name);
          }
        });
      }
